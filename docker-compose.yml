version: "3.8"

services:
  # ── Server: Hono SSE 服务 + Agent 核心 ──
  agent:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: production-agent-server
    ports:
      - "8000:8000"
    env_file:
      - deploy/.env
    environment:
      - NODE_ENV=production
      - PORT=8000
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      # Session JSONL 持久化（~/.pi/agent/sessions/）
      - agent-sessions:/root/.pi
      # Trace 日志持久化
      - agent-traces:/app/data/logs/traces
    restart: unless-stopped
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Web: Next.js 前端 ──
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: production-agent-web
    ports:
      - "3000:3000"
    env_file:
      - deploy/.env
    environment:
      - NODE_ENV=production
      - AI_API_URL=http://agent:8000
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Nginx: 反代 + SSL 终端 ──
  nginx:
    image: nginx:1.27-alpine
    container_name: production-agent-nginx
    ports:
      - "80:80"
      # - "443:443"  # 有 SSL 证书后启用
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/ssl:/etc/nginx/ssl:ro  # 有 SSL 证书后启用
    depends_on:
      agent:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-net

volumes:
  agent-sessions:
  agent-traces:

networks:
  agent-net:
    driver: bridge
