services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: production-agent-server
    ports:
      - "8000:8000"
    env_file:
      - deploy/.env
    environment:
      - NODE_ENV=production
      - PORT=8000
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - agent-sessions:/root/.pi
      - agent-traces:/app/data/logs/traces
    restart: unless-stopped
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: production-agent-web
    ports:
      - "80:3000"
    env_file:
      - deploy/.env
    environment:
      - NODE_ENV=production
      - AI_API_URL=http://agent:8000
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-net

volumes:
  agent-sessions:
  agent-traces:

networks:
  agent-net:
    driver: bridge
