# Nginx 反代配置 — 中试 AI 助手
# 假设部署在 http://your-server:80，SSL 证书通过 certbot 或阿里云/腾讯云获取

upstream agent_server {
    server agent:8000;
    keepalive 64;
}

upstream agent_web {
    server web:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # 如果有域名：server_name agent.yourcompany.com;

    # 日志
    access_log /var/log/nginx/agent_access.log;
    error_log  /var/log/nginx/agent_error.log;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Server API（SSE 长连接需特殊处理）──
    location /api/ {
        proxy_pass http://agent_server;
        proxy_http_version 1.1;

        # SSE 支持
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 超时：SSE 连接最长保持 5 分钟
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 真实 IP 透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health Check ──
    location /health {
        proxy_pass http://agent_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Web 前端 ──
    location / {
        proxy_pass http://agent_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 上传大小限制（前端无上传，防御性设置）
    client_max_body_size 10m;
}

